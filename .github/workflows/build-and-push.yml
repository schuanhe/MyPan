name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 编译 Go 后端并推送后端 Docker 镜像
  # ─────────────────────────────────────────────
  build-backend:
    name: Build Backend (Go → Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: 安装 GCC（CGO 所需，用于 SQLite）
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: 编译 Go 后端（Linux amd64）
        working-directory: backend
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o mypan-server .

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取 Docker 元数据（标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mypan-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2: 构建 Flutter Web 并推送前端 Docker 镜像
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (Flutter Web)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: "stable"
          cache: true

      - name: 安装 Flutter 依赖
        working-directory: frontend
        run: flutter pub get

      - name: 构建 Flutter Web（Release）
        working-directory: frontend
        run: flutter build web --release

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取 Docker 元数据（标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mypan-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
